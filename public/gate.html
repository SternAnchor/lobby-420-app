<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>420 Lobby — Enter</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #4a7c59;
      --sage: #a8c5a0;
      --gold: #c9a96e;
      --cream: #f5f0e8;
      --charcoal: #2c2c2c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #111;
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .smoke-container { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .smoke {
      position: absolute; bottom: -10%; width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,240,232,0.02) 0%, transparent 70%);
      animation: rise 14s infinite ease-out;
    }
    .smoke:nth-child(2) { left: 25%; animation-delay: 3s; width: 200px; height: 200px; }
    .smoke:nth-child(3) { left: 55%; animation-delay: 7s; width: 250px; height: 250px; }
    .smoke:nth-child(4) { left: 70%; animation-delay: 1.5s; width: 180px; height: 180px; }
    @keyframes rise {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 0.6; }
      100% { transform: translateY(-110vh) scale(2); opacity: 0; }
    }

    .gate {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }

    .gate-icon { font-size: 4rem; margin-bottom: 1.5rem; }

    .gate h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      line-height: 0.9;
      margin-bottom: 0.5rem;
    }
    .gate h1 .four { color: var(--sage); }
    .gate h1 .twenty { color: var(--gold); }

    .gate-subtitle {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: rgba(245,240,232,0.5);
      margin-bottom: 2rem;
    }

    .gate-prompt {
      color: rgba(245,240,232,0.5);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .gate-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .gate-input {
      width: 100%;
      padding: 1rem 1.25rem;
      border: 1px solid rgba(201,169,110,0.25);
      border-radius: 12px;
      background: rgba(245,240,232,0.04);
      color: var(--cream);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .gate-input:focus {
      border-color: var(--gold);
    }
    .gate-input::placeholder {
      color: rgba(245,240,232,0.2);
    }

    .gate-submit {
      padding: 0.85rem 2.5rem;
      background: rgba(201,169,110,0.15);
      border: 1px solid rgba(201,169,110,0.4);
      color: var(--gold);
      border-radius: 999px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.05em;
    }
    .gate-submit:hover {
      background: rgba(201,169,110,0.25);
      border-color: var(--gold);
    }
    .gate-submit:active { transform: scale(0.97); }

    .gate-error {
      color: rgba(245,140,140,0.8);
      font-size: 0.9rem;
      min-height: 1.4em;
      transition: opacity 0.3s;
    }

    .gate-hint {
      color: rgba(245,240,232,0.2);
      font-size: 0.75rem;
      margin-top: 1.5rem;
      letter-spacing: 0.05em;
    }

    /* Success animation */
    .gate.success .gate-icon { animation: celebrate 0.6s ease; }
    @keyframes celebrate {
      0% { transform: scale(1); }
      50% { transform: scale(1.3) rotate(10deg); }
      100% { transform: scale(1); }
    }

    .gate.success .gate-form { opacity: 0; transition: opacity 0.3s; }

    .gate-welcome {
      display: none;
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--gold);
      margin-top: 1rem;
      animation: fadeIn 0.5s ease;
    }
    .gate.success .gate-welcome { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Shake on wrong answer */
    .shake { animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
  </style>
</head>
<body>

  <div class="smoke-container">
    <div class="smoke"></div><div class="smoke"></div><div class="smoke"></div><div class="smoke"></div>
  </div>

  <div class="gate" id="gate">
    <div class="gate-icon">🐇</div>
    <h1><span class="four">4</span><span class="twenty">20</span></h1>
    <div class="gate-subtitle">Lobby</div>

    <p class="gate-prompt">If you were there, you know the theme.<br>What was it?</p>

    <form class="gate-form" id="gateForm" onsubmit="tryEnter(event)">
      <input type="text" class="gate-input" id="gateAnswer" placeholder="Describe the theme..." autocomplete="off" autofocus>
      <button type="submit" class="gate-submit">Enter the Party</button>
      <div class="gate-error" id="gateError">&nbsp;</div>
    </form>

    <div class="gate-welcome">Welcome back down the rabbit hole 🕳️</div>

    <p class="gate-hint">Hint: Think fairy tales, tea parties, and rabbit holes</p>
  </div>

  <script>
    async function tryEnter(e) {
      e.preventDefault();
      const input = document.getElementById('gateAnswer');
      const error = document.getElementById('gateError');
      const answer = input.value.trim();

      if (!answer) {
        error.textContent = "Say something...";
        return;
      }

      try {
        const res = await fetch('/api/gate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ answer })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('gate').classList.add('success');
          setTimeout(() => { window.location.href = '/'; }, 1500);
        } else {
          error.textContent = data.message;
          input.classList.add('shake');
          setTimeout(() => input.classList.remove('shake'), 400);
          input.select();
        }
      } catch (err) {
        error.textContent = "Something went wrong — try again";
      }
    }
  </script>

</body>
</html>
