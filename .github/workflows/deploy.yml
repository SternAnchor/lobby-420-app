name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_TOKEN }}
          password: ${{ secrets.DO_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            registry.digitalocean.com/sternanchor/lobby-420:latest
            registry.digitalocean.com/sternanchor/lobby-420:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to K8s
        env:
          DOCTL_TOKEN: ${{ secrets.DO_TOKEN }}
        run: |
          # Install doctl + kubectl
          curl -sL https://github.com/digitalocean/doctl/releases/latest/download/doctl-1.115.0-linux-amd64.tar.gz | tar xz
          sudo mv doctl /usr/local/bin/
          doctl auth init -t "$DOCTL_TOKEN"
          doctl kubernetes cluster kubeconfig save sternanchor
          
          # Update image
          kubectl set image deployment/lobby420 web=registry.digitalocean.com/sternanchor/lobby-420:${{ github.sha }} -n default 2>/dev/null || \
          kubectl apply -f k8s/ -n default
