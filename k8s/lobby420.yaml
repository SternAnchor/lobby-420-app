apiVersion: apps/v1
kind: Deployment
metadata:
  name: lobby420
  labels:
    app: lobby420
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: lobby420
  template:
    metadata:
      labels:
        app: lobby420
    spec:
      containers:
        - name: web
          image: registry.digitalocean.com/sternanchor/lobby-420:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: lobby420-uploads
      imagePullSecrets:
        - name: do-registry
---
apiVersion: v1
kind: Service
metadata:
  name: lobby420
spec:
  selector:
    app: lobby420
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lobby420
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - 420lobby.com
        - www.420lobby.com
      secretName: 420lobby-tls
  rules:
    - host: 420lobby.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lobby420
                port:
                  number: 80
    - host: www.420lobby.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lobby420
                port:
                  number: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lobby420-uploads
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: do-block-storage-retain
  resources:
    requests:
      storage: 5Gi
